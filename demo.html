<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Explorer Demo</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #map { height: 400px; width: 100%; }
        #info { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Route Explorer Demo</h1>
    <div id="map"></div>
    <div id="info">
        <p id="location">Location: Not available</p>
        <p id="distance">Distance: 0 km</p>
    </div>
    <script>
        // Simulated Points of Interest (POIs)
        const pois = [
            { name: 'Location A', lat: 37.7749, lng: -122.4194 },
            { name: 'Location B', lat: 37.7849, lng: -122.4094 },
            { name: 'Location C', lat: 37.7949, lng: -122.3994 }
        ];

        let userLocation = { lat: null, lng: null };

        function initMap() {
            const map = new google.maps.Map(document.getElementById('map'), {
                zoom: 12,
                center: { lat: 37.7749, lng: -122.4194 }
            });

            // Set up markers for each POI
            pois.forEach(poi => {
                new google.maps.Marker({
                    position: { lat: poi.lat, lng: poi.lng },
                    map,
                    title: poi.name
                });
            });

            // Get user location
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    userLocation.lat = position.coords.latitude;
                    userLocation.lng = position.coords.longitude;
                    const userMarker = new google.maps.Marker({
                        position: userLocation,
                        map,
                        title: 'Your Location'
                    });
                    document.getElementById('location').innerText = `Location: (${userLocation.lat.toFixed(4)}, ${userLocation.lng.toFixed(4)})`;

                    // Calculate distance from user to nearest POI
                    calculateDistance(userLocation);
                }, () => {
                    handleLocationError(true, map);
                });
            } else {
                handleLocationError(false, map);
            }
        }

        function calculateDistance(location) {
            let nearestDistance = Infinity;
            let nearestPoi = null;
            pois.forEach(poi => {
                const distance = getDistanceFromLatLonInKm(location.lat, location.lng, poi.lat, poi.lng);
                if (distance < nearestDistance) {
                    nearestDistance = distance;
                    nearestPoi = poi.name;
                }
            });
            document.getElementById('distance').innerText = `Distance to ${nearestPoi}: ${nearestDistance.toFixed(2)} km`;
        }

        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371; // Radius of the Earth in km
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            const distance = R * c; // Distance in km
            return distance;
        }

        function deg2rad(deg) {
            return deg * (Math.PI / 180);
        }

        function handleLocationError(browserHasGeolocation, map) {
            const infoWindow = new google.maps.InfoWindow();
            infoWindow.setPosition(map.getCenter());
            infoWindow.setContent(browserHasGeolocation ? 
                'Error: The Geolocation service failed.' : 'Error: Your browser doesn\u2019t support geolocation.');
            infoWindow.open(map);
        }
    </script>
    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap">
    </script>
</body>
</html>
